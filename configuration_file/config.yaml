# Anaerobic digestion of different feedstocks

  ad_biogas_cive:
    production volume:
      variable: Production|Natural gas|Anaerobic digestion CIVE|Biogas
    ecoinvent alias:
      name: anaerobic digestion of sequential crops, with biogenic carbon uptake 
      reference product:  biogas
      exists in original database: True
      regionalize: True

    efficiency:
      - variable: Efficiency|Natural gas|Anaerobic digestion CIVE|Biogas to biomethane|Generic
        reference year: 2020
        includes:
          technosphere:
            - supply
            - electricity
            - boiler
            - construction
          biosphere:
            - Carbon dioxide, in air
            - Carbon monoxide
            - Dinitrogen monoxide
            - Nitrogen
            - Sulfur
            - NMVOC
            - Platinum
        
      - variable: Efficiency|Natural gas|Anaerobic digestion CIVE|Biogas to biomethane|Biogenic CO2 emissions
        reference year: 2020
        includes:
          biosphere:
            - Carbon dioxide, non-fossil

      - variable: Efficiency|Natural gas|Anaerobic digestion CIVE|Biogas to biomethane|Biogenic CH4 emissions
        reference year: 2020
        includes:
          biosphere:        
            - Methane, non-fossil
  
