# Configuration file for custom scenarios for `premise`
# Transition(s) 2050 / ADEME
# https://www.ademe.fr/les-futurs-en-transition/

---
regionalize:
  datasets:
    - name: carbon dioxide storage at synthetic natural gas plant, post, 400km pipeline, storage 3000m
      reference product: carbon dioxide storage at synthetic natural gas plant, post, 400km pipeline, storage 3000m
      exists in original database: True

production pathways:

#Electricity

  nuclear_pressure_water:
    production volume:
      variable: Production|Electricity|Nuclear
    ecoinvent alias:
      name: electricity production, nuclear, pressure water reactor
      reference product: electricity, high voltage
      exists in original database: True

  mix_gas_cycle_turbines:
    production volume:
      variable: Production|Electricity|Conventional|Mix gas|Cycle Turbines total
    ecoinvent alias:
      name: electricity production, natural gas, combined cycle power plant
      reference product: electricity, high voltage
      exists in original database: True
      regionalize: True

  coal:
    production volume:
      variable: Production|Electricity|Conventional|Coal
