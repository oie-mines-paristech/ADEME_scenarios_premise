  battery:
    production volume:
      variable: Production|Electricity|Storage|Battery
    ecoinvent alias:
      name: electricity supply, high voltage, from vanadium-redox flow battery system, Tr2050
      reference product: electricity, high voltage
      exists in original database: True
      regionalize: True

    efficiency:
