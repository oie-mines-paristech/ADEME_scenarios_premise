      name: electricity production, oil
      reference product: electricity, high voltage
      exists in original database: True

  mix_gas_chp:
    production volume:
      variable: Production|Electricity|Conventional|Mix gas|CHP
    ecoinvent alias:
      name: heat and power co-generation, natural gas, conventional power plant, 100MW electrical
      reference product: electricity, high voltage
      exists in original database: True
      regionalize: True


  pv:
    production volume:
      variable: Production|Electricity|Renewable|Photovoltaic total
    ecoinvent alias:
      name: electricity production, photovoltaic
      reference product: electricity, low voltage
      exists in original database: True

  wind_offshore:
    production volume:
      variable: Production|Electricity|Renewable|Wind turbines|Offshore total
    ecoinvent alias:
      name: electricity production, wind, 1-3MW turbine, offshore
      reference product: electricity, high voltage
      exists in original database: True

  wind_onshore:
    production volume:
      variable: Production|Electricity|Renewable|Wind turbines|Onshore total
    ecoinvent alias:
      name: electricity production, wind, 1-3MW turbine, onshore
      reference product: electricity, high voltage
      exists in original database: True

  wave:
    production volume:
      variable: Production|Electricity|Renewable|Sea
    ecoinvent alias:
      name: electricity production, wave energy converter
      reference product: electricity, high voltage
      exists in original database: True

  biogas_chp:
    production volume:
      variable: Production|Electricity|Renewable|Biogas|CHP
    ecoinvent alias:
      name: heat and power co-generation, biogas, gas engine
      reference product: electricity, high voltage
      exists in original database: True
      regionalize: True

  biomass_chp:
    production volume:
      variable: Production|Electricity|Renewable|Biomass|CHP
    ecoinvent alias:
      name: heat and power co-generation, wood chips, 6667 kW
      reference product: electricity, high voltage
      exists in original database: True

  waste:
    production volume:
      variable: Production|Electricity|Conventional|Waste
    ecoinvent alias:
      name: treatment of municipal solid waste, incineration
      reference product: electricity, for reuse in municipal waste incineration only
      exists in original database: True

  geothermal:
    production volume:
      variable: Production|Electricity|Renewable|Geothermal
    ecoinvent alias:
      name: electricity production, deep geothermal
      reference product: electricity, high voltage
      exists in original database: True

  hydro_reservoir:
    production volume:
      variable: Production|Electricity|Hydro|Reservoir
    ecoinvent alias:
      name: electricity production, hydro, reservoir, alpine region
      reference product: electricity, high voltage
      exists in original database: True

  hydro_run_of_river:
    production volume:
      variable: Production|Electricity|Hydro|Run of river
    ecoinvent alias:
      name: electricity production, hydro, run-of-river
      reference product: electricity, high voltage
      exists in original database: True


  import:
    production volume:
      variable: Production|Electricity|Imports
    ecoinvent alias:
      name: market group for electricity, high voltage
      reference product: electricity, high voltage
      exists in original database: True

  hydro_pumped_storage:
    production volume:
      variable: Production|Electricity|Storage|Hydro|Pumped storage
    ecoinvent alias:
      name: electricity production, hydro, pumped storage, Tr2050
      reference product: electricity, high voltage
      exists in original database: True
    efficiency:
      - variable: Efficiency|Storage|Hydro|Pumped storage
        includes:
          technosphere:
            - electricity

  battery:
    production volume:
      variable: Production|Electricity|Storage|Battery
    ecoinvent alias:
      name: electricity supply, high voltage, from vanadium-redox flow battery system, Tr2050
      reference product: electricity, high voltage
      exists in original database: True

    efficiency:
      - variable: Efficiency|Storage|Battery|Charge
        includes:
          technosphere:
            - electricity

  medium_to_high:
    production volume:
      variable: Production|Electricity|Medium to high
    ecoinvent alias:
      name: market for electricity, high voltage, Tr2050
      reference product: electricity, high voltage
      exists in original database: False
