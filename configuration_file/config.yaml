markets:

  - name: market for hydrogen, gaseous, for transport - direct use of H2, Tr2050
    reference product: hydrogen, gaseous
    unit: kilogram
    includes:
      - methane_reforming_hydrogen_transport
      - methane_reforming_CCS_hydrogen_transport
      - electrolysis_hydrogen_transport

    add:
      - name: pipeline, hydrogen, low pressure distribution network
        reference product: pipeline, for hydrogen distribution
        unit: kilometer
        amount: 1.14422E-06
      - name: pipeline, hydrogen, high pressure transmission network
        reference product: pipeline, for hydrogen transmission
        unit: kilometer
        amount: 2.01706E-09
      - name: compressor assembly for transmission hydrogen pipeline
        reference product: compressor, for hydrogen transmission
        unit: unit
        amount: 3.22703E-11
      - name: geological hydrogen storage
        reference product: hydrogen storage
        unit: kilogram
        amount: 0.302074305
      - name: market for electricity, low voltage
        reference product: electricity, low voltage
        unit: kilowatt hour
        amount: 1.82
      - name: market for hydrogen, gaseous, for transport - direct use of H2, Tr2050
        reference product: hydrogen, gaseous
        unit: kilogram
        amount: 0.005
      - name: Hydrogen
        categories: air::non-urban air or from high stacks
        unit: kilogram
        amount: 0.005

    except regions:
      - World


