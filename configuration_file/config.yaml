markets:

#Electricity
  - name: market for electricity, high voltage, Tr2050
    reference product: electricity, high voltage
    unit: kilowatt hour
    includes:
      - nuclear_pressure_water
      - mix_gas_cycle_turbines
      - coal
      - fuel_oil_chp
      - mix_gas_chp
      - pv
      - wind_offshore
      - wind_onshore
      - wave
      - biogaz_chp
      - biomass_chp
      - waste
      - geothermal
      - hydro_reservoir
      - hydro_run_of_river
      - hydro_pumped_storage
      - battery
      - import

    add:

      - name: market for electricity, high voltage, Tr2050
        reference product: electricity, high voltage
        amount: 0.0312

      - name: transmission network, electricity, high voltage direct current aerial line
        reference product: transmission network, electricity, high voltage direct current aerial line
        amount: 5.65e-09

      - name: transmission network, electricity, high voltage direct current land cable
        reference product: transmission network, electricity, high voltage direct current land cable
        amount: 3.86e-10

      - name: transmission network, electricity, high voltage direct current subsea cable
        reference product: transmission network, electricity, high voltage direct current subsea cable
        amount: 3.47e-12


      - name: Dinitrogen monoxide
        categories: air
        unit: kilogram
        amount: 5.0e-06

      - name: Ozone
        categories: air
        unit: kilogram
        amount: 4.16e-06

    replaces:
      - name: market for electricity, high voltage
        product: electricity, high voltage
        location: FR

    except regions:
      - World


  - name: market for electricity, medium voltage, Tr2050
    reference product: electricity, medium voltage
    unit: kilowatt hour
    includes:
      - medium_to_high

    add:

      - name: market for electricity, medium voltage, Tr2050
        reference product: electricity, medium voltage
        amount: 0.0042

      - name: market for sulfur hexafluoride, liquid
        reference product: sulfur hexafluoride, liquid
        amount: 5.4e-08

      - name: transmission network construction, electricity, medium voltage
        reference product: transmission network, electricity, medium voltage
        amount: 1.86e-08

      - name: Sulfur hexafluoride
        categories: air
        unit: kilogram
        amount: 5.4e-08

    replaces:
      - name: market for electricity, medium voltage
        product: electricity, medium voltage
        location: FR

    except regions:
      - World

  - name: market for electricity, low voltage, Tr2050
    reference product: electricity, low voltage
    unit: kilowatt hour
    includes:
      - low_to_medium

    add:
      - name: market for electricity, low voltage, Tr2050
        reference product: electricity, low voltage
        amount: 0.0307

      - name: market for sulfur hexafluoride, liquid
        reference product: sulfur hexafluoride, liquid
        amount: 4.03e-10

      - name: distribution network construction, electricity, low voltage
        reference product: distribution network, electricity, low voltage
        amount: 8.74e-08

      - name: Sulfur hexafluoride
        categories: air
        unit: kilogram
        amount: 4.03e-10

    replaces:
      - name: market for electricity, low voltage
        product: electricity, low voltage
        location: FR

    except regions:
      - World

